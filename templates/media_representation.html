{% extends "base.html" %}

{% block title %}Media Representation{% endblock %}

{% block content %}
<h1>Media Representation</h1>

<form method="POST">
    <label>Dataset:
        <select name="dataset">
            {% for key, label in dataset_options.items() %}
            <option value="{{ key }}" {% if key == selected_dataset %}selected{% endif %}>{{ label }}</option>
            {% endfor %}
        </select>
    </label>
    <label>From: <input type="date" name="start_date" value="{{ start_date }}"></label>
    <label>To: <input type="date" name="end_date" value="{{ end_date }}"></label>
    <button type="submit">Update</button>
</form>

<h2>Number of times articles mentioned by state</h2>
{{ choropleth|safe }}

<h2>Raw location data on where articles have mentioned people</h2>
{{ heatmap|safe }}
{% endblock %}
